<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <!-- draftpilot: pilot silhouette as abstract feather/pen shape, navy + drift -->
  <!-- bg: pilot deep #0d1117 / primary: soft gold #d4a853 / accent: dusk #6e7eaa -->
  <rect width="100" height="100" rx="22" fill="#0d1117"/>
  <!-- Abstract feather / pen nib — single unified shape -->
  <path d="M 50 18 L 68 42 Q 72 52 65 62 L 50 78 L 42 62 Q 30 52 38 38 Z"
        fill="#d4a853" opacity="0.92"/>
  <!-- Inner slant — nib slit -->
  <path d="M 50 30 L 50 70" stroke="#0d1117" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Drift accent: small horizontal dash at base -->
  <line x1="42" y1="68" x2="58" y2="68" stroke="#6e7eaa" stroke-width="3" stroke-linecap="round" opacity="0.85"/>
</svg>
